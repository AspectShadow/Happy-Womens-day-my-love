<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Your Letter</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;

/* Disable text selection */
user-select:none;
-webkit-user-select:none;
-ms-user-select:none;
-webkit-touch-callout:none;
}

/* Envelope */

.envelope{
width:220px;
height:150px;
background:#d94b5a;
position:relative;
border-radius:5px;
cursor:pointer;
}

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-bottom:75px solid #c13a4a;
transform-origin:top;
transition:transform 0.6s;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

/* Letter */

.letter{
position:absolute;
top:20px;
left:10px;
width:200px;
height:110px;
background:white;
color:black;
padding:10px;
box-sizing:border-box;
border-radius:5px;
transform:translateY(40px);
transition:transform 0.6s;
font-size:14px;
}

.envelope.open .letter{
transform:translateY(-60px);
}

/* Button */

button{
margin-top:40px;
padding:14px 22px;
font-size:18px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;

/* Prevent text selection */
user-select:none;
-webkit-user-select:none;
-ms-user-select:none;
-webkit-touch-callout:none;
}

button:active{
transform:scale(0.95);
}

</style>

</head>

<body>

<h2>Tap the Envelope 💌</h2>

<div class="envelope" onclick="openLetter()" id="envelope">

<div class="flap"></div>

<div class="letter">
Happy Women's Day ❤️<br>
You are strong, beautiful, and amazing.<br>
I love you, meri jaan.
</div>

</div>

<button onclick="nextPage()">Final Surprise ➜</button>

<script>

function openLetter(){
document.getElementById("envelope").classList.toggle("open");
}

function nextPage(){
window.location.href="page4.html";
}

</script>

</body>
</html>
<h2>One last thing...</h2>

<div class="envelope">

<div class="envelope-body"></div>
<div class="envelope-left"></div>
<div class="envelope-right"></div>
<div class="envelope-top"></div>

</div>

<p>Hold to unlock my heart ❤️</p>

<button
onmousedown="startHold()"
onmouseup="cancelHold()"
ontouchstart="startHold()"
ontouchend="cancelHold()">
Hold to Unlock
</button>

<script>

let timer;

function startHold(){
timer=setTimeout(()=>{
window.location.href="page4.html";
},3000);
}

function cancelHold(){
clearTimeout(timer);
}

</script>

</body>
</html>
